site_name: CloudStub
site_description: Embedded, containerless AWS mock for JVM integration tests
site_url: https://cloudstub.github.io/cloudstub/
repo_url: https://github.com/cloudstub/cloudstub
repo_name: cloudstub/cloudstub
edit_uri: edit/main/docs/gh-pages/
docs_dir: docs/gh-pages

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - JUnit Extension: junit-extension.md
      - Spring Boot Integration: spring-boot.md
      - Fault Injection: fault-injection.md
      - Standalone Mode: standalone.md
      - REST API: rest-api.md
      - CLI: cli.md
      - Console: console.md
      - Logging: logging.md
      - SDK v1 Support: sdk-v1.md
  - Module Authoring: module-authoring.md
  - CloudStub Codegen: codegen.md
  - Changelog: changelog.md
  - Javadoc: javadoc/index.html

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
