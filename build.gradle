buildscript {
    repositories { gradlePluginPortal() }
    dependencies { classpath 'com.github.johnrengelman:shadow:8.1.1' }
}

subprojects {
    apply plugin: 'java'

    group = 'io.cloudmock'
    version = '0.1.0-SNAPSHOT'

    // Example projects (the cloudmock-example container and its junit5/junit6 children) are
    // demonstration apps, not libraries — they are never published. Excluding them here keeps
    // publishing self-correcting: no io.cloudmock:junit5 / :junit6 / :cloudmock-example artifacts
    // leak to a repository regardless of how the example tree is restructured.
    def publishable = project.path != ':cloudmock-example' && !project.path.startsWith(':cloudmock-example:')
    if (publishable) {
        apply plugin: 'maven-publish'
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    repositories {
        mavenCentral()
    }

    dependencies {
        testImplementation platform(libs.junit.bom)
        testImplementation libs.junit.jupiter
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    test {
        useJUnitPlatform()
    }

    // Publishing is configured in afterEvaluate so that modules applying the
    // Shadow plugin (cloudmock-core) can publish the shadow JAR via components.shadow
    // rather than the empty components.java.
    afterEvaluate {
        if (publishable) {
            publishing {
                publications {
                    mavenJava(MavenPublication) {
                        from(components.findByName('shadow') ?: components.java)
                        artifactId = project.name
                    }
                }
            }
        }
    }

    // Service modules may depend on cloudmock-core (the SPI lives there), but no service module
    // may depend on another service module at compile or runtime. Test code is exempt so that
    // integration test modules (e.g. cloudmock-junit tests) can combine multiple modules.
    // cloudmock-standalone is also exempt: its entire purpose is to bundle all service modules
    // into a single runnable fat JAR.
    afterEvaluate {
        if (project.name == 'cloudmock-standalone') return
        ['compileClasspath', 'runtimeClasspath'].each { cfgName ->
            configurations.findByName(cfgName)?.allDependencies?.each { dep ->
                if (dep.group == 'io.cloudmock' && dep.name != 'cloudmock-core') {
                    throw new GradleException(
                        "Module isolation violation in '${project.name}': " +
                        "declared dependency on '${dep.group}:${dep.name}' is forbidden. " +
                        "cloudmock-* service modules must not depend on each other."
                    )
                }
            }
        }
    }

    if (project.name != 'cloudmock-standalone') {
        configurations.matching { !it.name.toLowerCase().contains('test') }.configureEach {
            resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'io.cloudmock' && details.requested.name != 'cloudmock-core') {
                    throw new GradleException(
                        "Module isolation violation in '${project.name}': " +
                        "transitive dependency on '${details.requested.group}:${details.requested.name}' is forbidden. " +
                        "cloudmock-* service modules must not depend on each other."
                    )
                }
            }
        }
    }
}
