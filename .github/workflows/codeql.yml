name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly scan (Mondays 03:27 UTC) catches vulnerabilities introduced by dependency
    # updates even when no code changed.
    - cron: '27 3 * * 1'

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2

      # Match the CI pipeline's JDK so CodeQL's autobuild compiles the project the same way.
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
