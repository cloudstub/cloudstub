name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/gh-pages/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      # Module source feeds the aggregated Javadoc, so a source change redeploys the site to keep
      # the API reference in sync.
      - "**/src/main/java/**"
      - "build.gradle"
      - "gradle/libs.versions.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: "8.8"

      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Generate API docs
        run: |
          gradle generateDocs
          rm -rf docs/gh-pages/api
          cp -r docs/api docs/gh-pages/api
          # Javadoc bundles third-party license texts as Markdown (legal/*.md). MkDocs would render
          # them as orphan pages; drop them so only the API HTML/CSS/JS is published.
          find docs/gh-pages/api -name '*.md' -delete

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
