name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0-beta.5), no leading v"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: "8.8"

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]] || [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "::error::'$VERSION' is not a release version (expected MAJOR.MINOR.PATCH[-prerelease], no -SNAPSHOT)."
            exit 1
          fi

      - name: Build and test
        run: gradle build

      - name: Publish to GitHub Packages
        run: gradle publishAllPublicationsToGitHubPackagesRepository -Pversion="${{ inputs.version }}"
