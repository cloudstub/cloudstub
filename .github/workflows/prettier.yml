name: Prettier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default for the whole workflow; the format job widens to contents: write.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4

      - name: Check markdown formatting
        run: npx --yes prettier@3.3.3 --check "**/*.md"
